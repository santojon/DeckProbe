name: Bug report
description: A probe / CLI / pipeline isn't behaving as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report! DeckProbe is a developer-only toolkit,
        so reports tend to be either "this probe returns the wrong shape"
        or "this CLI flag stopped working." Please share enough to
        reproduce.
  - type: input
    id: deck-target
    attributes:
      label: Target device
      description: Steam Deck OLED? LCD? SteamOS VM? SteamOS version.
      placeholder: "Steam Deck OLED, SteamOS 3.7.21"
    validations:
      required: true
  - type: input
    id: deckprobe-rev
    attributes:
      label: DeckProbe commit
      description: Output of `git -C deckprobe rev-parse --short HEAD`.
      placeholder: "abc1234"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact CLI invocation + minimal probe / config to reproduce.
      placeholder: |
        1. Drop this `deckprobe.config.json` at the parent repo root: …
        2. Run `python3 deckprobe/cli.py diag run diag_layout`
        3. Observed output: …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / probe output
      description: Paste any CDP output, traceback, or `--verbose` log.
      render: shell
