name: GitHub Clones

# Updates the gist-backed clone-count badge once a day.
# Fetches /repos/{owner}/{repo}/traffic/clones, accumulates daily totals,
# and pushes the rolling JSON to a public gist that shields.io renders as a badge.
#
# Required repository secrets:
#   GIST_SECRET — a Personal Access Token (Classic) with the `gist`
#                 scope. Generate at https://github.com/settings/tokens
#
# Required repository variables (Settings → Secrets and variables → Actions → Variables):
#   GIST_ID — id of the public gist hosting `clone.json` for this repo.
#             Create an empty public gist named `clone.json` once, then
#             copy the alphanumeric id from its URL into this variable.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clones:
    runs-on: ubuntu-latest
    if: vars.GIST_ID != ''
    steps:
      - name: Update clone-count gist
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_SECRET }}
          GIST_ID: ${{ vars.GIST_ID }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request, urllib.error

          token   = os.environ["GITHUB_TOKEN"]
          gist_id = os.environ["GIST_ID"]
          repo    = os.environ["REPO"]

          def gh(url, method="GET", data=None):
              req = urllib.request.Request(
                  url,
                  headers={"Authorization": f"token {token}",
                           "Accept": "application/vnd.github+json",
                           "X-GitHub-Api-Version": "2022-11-28"},
                  method=method,
                  data=json.dumps(data).encode() if data else None,
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Fetch today's clone traffic (last 14 days)
          traffic = gh(f"https://api.github.com/repos/{repo}/traffic/clones")
          today_entries = {e["timestamp"][:10]: e for e in traffic.get("clones", [])}

          # Read existing accumulated data from gist
          gist = gh(f"https://api.github.com/gists/{gist_id}")
          raw = gist.get("files", {}).get("clone.json", {}).get("content", "{}")
          try:
              accumulated = json.loads(raw)
          except Exception:
              accumulated = {}

          # Merge: newer traffic data wins for overlapping dates
          accumulated.update({
              date: {"count": e["count"], "uniques": e["uniques"]}
              for date, e in today_entries.items()
          })

          total_clones  = sum(v["count"]   for v in accumulated.values())
          total_uniques = sum(v["uniques"] for v in accumulated.values())

          payload = {
              "total": total_clones,
              "unique": total_uniques,
              "dates": accumulated,
          }

          # Update gist
          gh(
              f"https://api.github.com/gists/{gist_id}",
              method="PATCH",
              data={"files": {"clone.json": {"content": json.dumps(payload, indent=2)}}},
          )

          print(f"Updated gist {gist_id}: {total_clones} clones, {total_uniques} unique")
          EOF
